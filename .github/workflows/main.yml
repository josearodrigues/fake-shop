name: CI-CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Obter o código da aplicação
        uses: actions/checkout@v4

      - name: Autenticando no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}      

      - name: Construindo e Enviando a Imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: ./src
          push: true
          file: ./src/Dockerfile
          tags: |
            americojar2014/fake-shop:latest
            americojar2014/fake-shop:v${{ github.run_number }}

  cd:
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: Autenticar na AWS
        run: echo "Executando o comando aws configure"

      - name: Configurar o kubectl
        run: echo "Executando o comando aws eks update-kubeconfig"

      - name: Aplicar os manifestos no kubernetes
        run: echo "Executando o comando kubectl apply"
